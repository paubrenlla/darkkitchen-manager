<style>
  :host {
    --brand-color: #3b82f6;       /* color principal (botón, links, etc.) */
    --brand-color-hover: #2563eb; /* color on hover */
    --background-color: #E0E7FF; /* color de fondo */
  }
</style>

<mat-sidenav-container class="dashboard-container" style="height: 100vh;">

  <mat-sidenav mode="side" opened class="sidebar" style="width: 260px; 'var(--background-color)';">
    <div class="sidebar-header" style="padding: 20px; text-align: center; border-bottom: 1px solid #e0e0e0;">
      <h2 style="margin: 0; font-weight: 600; color: #3f51b5;">Dark Kitchen</h2>
      <span style="font-size: 12px; color: #757575;">Panel de {{ currentUserRole() }}</span>
    </div>

    <mat-nav-list>
      @for (item of menuItems(); track item.route) {
        <a mat-list-item [routerLink]="[item.route]" routerLinkActive="active-link" style="margin: 4px 8px; borderRadius: 4px;">
          <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
          <span matListItemTitle>{{ item.label }}</span>
        </a>
      }
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar color="primary" class="navbar" style="display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
      <span>Sistema de Gestión Gastronómica</span>

      <div style="display: flex; align-items: center; gap: 15px;">
        <span style="font-size: 14px; font-weight: 300;">{{ userEmail() }}</span>
        <button mat-icon-button (click)="logout()" title="Cerrar sesión">
          <mat-icon>logout</mat-icon>
        </button>
      </div>
    </mat-toolbar>

    <main style="padding: 24px; overflow-y: auto; height: calc(100vh - 64px); box-sizing: border-box; background-color: #fafafa;">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>
</mat-sidenav-container>
