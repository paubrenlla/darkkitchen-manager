<div class="w-[400px]">
  <h2 mat-dialog-title class="text-lg font-bold text-slate-800 px-6 pt-6 pb-0">
    {{ isEditMode ? 'Editar tipo de envío' : 'Nuevo tipo de envío' }}
  </h2>

  <mat-dialog-content class="!px-6 !pt-4 !pb-2">
    <div class="flex flex-col gap-4">
      @if (errorMessage()) {
        <div class="bg-rose-50 border border-rose-100 text-rose-600 px-4 py-3 rounded-xl text-xs font-medium">
          {{ errorMessage() }}
        </div>
      }

      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <mat-label>Nombre *</mat-label>
        <input matInput [(ngModel)]="name" placeholder="Ej: Envío estándar" />
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full" subscriptSizing="dynamic">
        <mat-label>Costo *</mat-label>
        <input matInput type="number" [(ngModel)]="cost" placeholder="0" min="0" />
        <span matPrefix class="text-slate-400 text-sm mr-1">$</span>
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions class="!px-6 !pb-5 !pt-4 flex justify-end gap-2">
    <button mat-stroked-button (click)="onCancel()" [disabled]="isLoading()">
      Cancelar
    </button>
    <button
      mat-flat-button
      color="primary"
      (click)="onSubmit()"
      [disabled]="isLoading() || !name.trim() || cost === null || cost < 0"
    >
      @if (isLoading()) {
        <mat-spinner diameter="18"></mat-spinner>
      } @else {
        {{ isEditMode ? 'Guardar cambios' : 'Crear' }}
      }
    </button>
  </mat-dialog-actions>
</div>
