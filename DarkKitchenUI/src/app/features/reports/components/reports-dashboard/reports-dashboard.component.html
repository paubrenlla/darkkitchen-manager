<div class="p-2 max-w-5xl mx-auto">
  <div class="mb-6">
    <h2 class="text-xl font-bold text-slate-800">Reportes y Estadísticas</h2>
    <p class="text-sm text-slate-400 mt-0.5">Análisis de ventas y productos del sistema</p>
  </div>

  <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
    <mat-tab-group animationDuration="200ms" class="reports-tabs">
      <mat-tab>
        <ng-template mat-tab-label>
          <mat-icon class="mr-2 text-base">emoji_events</mat-icon>
          Productos más vendidos
        </ng-template>
        <app-top-products-report></app-top-products-report>
      </mat-tab>

      <mat-tab>
        <ng-template mat-tab-label>
          <mat-icon class="mr-2 text-base">bar_chart</mat-icon>
          Reporte de ventas
        </ng-template>
        <app-sales-report></app-sales-report>
      </mat-tab>
    </mat-tab-group>
  </div>
</div>
