<div class="p-6">
  <div class="flex flex-wrap items-center gap-4 mb-6 p-4 rounded-2xl bg-white shadow-md border border-slate-100">
    <mat-form-field appearance="outline" class="w-full sm:w-72" subscriptSizing="dynamic">
      <mat-label>Rango de fechas</mat-label>
      <mat-date-range-input [rangePicker]="picker">
        <input matStartDate [(ngModel)]="fromDate" placeholder="Desde">
        <input matEndDate [(ngModel)]="toDate" placeholder="Hasta">
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>

    <button
      mat-flat-button
      (click)="search()"
      class="!rounded-xl !py-5 !px-6 shadow-sm h-[48px]"
      [disabled]="isLoading()"
      style="background-color: var(--brand-color); color: white;">
      @if (isLoading()) {
        <mat-spinner diameter="20" class="mr-2 inline-block"></mat-spinner>
      } @else {
        <mat-icon>filter_list</mat-icon>
      }
      <span>{{ isLoading() ? 'Buscando...' : 'Filtrar' }}</span>
    </button>
  </div>

  @if (errorMessage()) {
    <div class="bg-rose-50 border border-rose-100 text-rose-600 px-4 py-3 rounded-xl text-sm flex items-center gap-2 mb-6">
      <mat-icon class="text-rose-500">error_outline</mat-icon>
      {{ errorMessage() }}
    </div>
  }

  @if (isLoading()) {
    <div class="flex justify-center items-center py-20">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else if (hasSearched()) {
    <div class="overflow-hidden rounded-2xl bg-white shadow-md">
      <table mat-table [dataSource]="products()" class="w-full">

        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef class="!p-4 !text-left !text-sm !font-semibold !text-slate-800">Código</th>
          <td mat-cell *matCellDef="let p" class="!p-4 font-mono text-sm text-slate-600">{{ p.code }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="!p-4 !text-left !text-sm !font-semibold !text-slate-800">Producto</th>
          <td mat-cell *matCellDef="let p" class="!p-4 font-medium text-slate-800">{{ p.name }}</td>
        </ng-container>

        <ng-container matColumnDef="quantitySold">
          <th mat-header-cell *matHeaderCellDef class="!p-4 !text-left !text-sm !font-semibold !text-slate-800">Cantidad Vendida</th>
          <td mat-cell *matCellDef="let p" class="!p-4 text-sm font-bold text-slate-700">{{ p.quantitySold }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns" style="background-color: var(--background-color);"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"
            class="border-t transition-colors duration-150 hover:bg-[var(--background-color)]"
            style="border-color: var(--border-color);"></tr>
      </table>

      @if (products().length === 0) {
        <div class="text-center py-14 text-slate-400">
          <mat-icon class="text-4xl mb-2">trending_down</mat-icon>
          <p class="text-sm">No se encontraron ventas en este periodo</p>
        </div>
      }
    </div>
  }
</div>
