<div class="p-6">
  <div class="flex flex-wrap items-end gap-4 mb-6">
    <mat-form-field appearance="outline" class="minimal-input w-72" subscriptSizing="dynamic">
      <mat-label>Rango de fechas</mat-label>
      <mat-date-range-input [rangePicker]="picker">
        <input matStartDate [(ngModel)]="fromDate" placeholder="Desde">
        <input matEndDate [(ngModel)]="toDate" placeholder="Hasta">
      </mat-date-range-input>
      <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
      <mat-date-range-picker #picker></mat-date-range-picker>
    </mat-form-field>

    <button mat-flat-button color="primary" (click)="search()" class="!rounded-xl !py-6 !px-8 shadow-sm h-[48px]" [disabled]="isLoading()">
      @if (isLoading()) {
        <mat-spinner diameter="20" class="mr-2 inline-block"></mat-spinner>
      }
      @if (!isLoading()) {
        <mat-icon>search</mat-icon>
      }
      <span>{{ isLoading() ? 'Buscando...' : 'Buscar' }}</span>
    </button>
  </div>

  @if (errorMessage()) {
    <div class="bg-rose-50 border border-rose-200 text-rose-700 px-4 py-3 rounded-xl mb-6 flex items-start gap-3 shadow-sm">
      <mat-icon class="text-rose-500 mt-0.5">error_outline</mat-icon>
      <div>
        <p class="font-semibold text-sm">Error</p>
        <p class="text-sm mt-0.5">{{ errorMessage() }}</p>
      </div>
    </div>
  }

  @if (hasSearched() && !isLoading()) {
    <div class="rounded-xl border border-slate-200 overflow-hidden bg-white shadow-sm animate-fade-in">
      <table mat-table [dataSource]="products()" class="w-full">

        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef class="text-xs font-semibold text-slate-500 uppercase">Código</th>
          <td mat-cell *matCellDef="let p" class="font-mono text-sm text-slate-700">{{ p.code }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef class="text-xs font-semibold text-slate-500 uppercase">Producto</th>
          <td mat-cell *matCellDef="let p" class="text-sm text-slate-800 font-bold">{{ p.name }}</td>
        </ng-container>

        <ng-container matColumnDef="quantitySold">
          <th mat-header-cell *matHeaderCellDef class="text-xs font-semibold text-slate-500 uppercase text-right">Cant. Vendida</th>
          <td mat-cell *matCellDef="let p" class="text-sm font-bold text-emerald-600 text-right">
            <span class="bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">
              {{ p.quantitySold }}
            </span>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns" class="bg-slate-50"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns" class="hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0"></tr>
      </table>

      @if (products().length === 0) {
        <div class="text-center py-14 text-slate-400">
          <mat-icon class="text-4xl mb-2">trending_down</mat-icon>
          <p class="text-sm">No se encontraron ventas en este periodo</p>
        </div>
      }
    </div>
  }
</div>
