services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: darkkitchen-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "DarkKitchen2026!"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data: